name: "implement-feature"
description: "Standard feature implementation workflow with TDD"

steps:
  - name: "analyze-task"
    agent: "mayor"
    description: "Load task from BEAD and analyze"
    action: "analyze"
    
  - name: "write-tests"
    agent: "aem-tester"
    description: "Write TDD specification tests (RED phase)"
    action: "generate-tests"
    command: "mvn test -Dtest=*Spec"
    wait_for: "tests-written"
    
  - name: "implement"
    agent: "aem-coder"
    description: "Implement to pass tests (GREEN phase)"
    action: "generate-code"
    depends_on: "write-tests"
    command: "mvn compile"
    wait_for: "code-compiles"
    
  - name: "run-tests"
    agent: "aem-tester"
    description: "Run all tests"
    depends_on: "implement"
    action: "run-tests"
    command: "mvn test"
    quality_gate: "tests_pass"
    
  - name: "review"
    agent: "aem-reviewer"
    description: "Code review for quality and security"
    depends_on: "run-tests"
    action: "review-code"
    quality_gate: "review_approved"
    
  - name: "update-bead"
    agent: "mayor"
    description: "Update BEAD task status"
    depends_on: "review"
    action: "update-status"
