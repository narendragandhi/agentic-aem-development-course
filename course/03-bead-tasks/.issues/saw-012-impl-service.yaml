technical_notes: |
  ## ClamAV Protocol Implementation

  The INSTREAM command is used for streaming file content:

  ```
  1. Connect to clamd (default: localhost:3310)
  2. Send: "zINSTREAM\0"
  3. For each chunk (8KB recommended):
     - Send 4-byte big-endian length
     - Send chunk data
  4. Send 4 zero bytes to end
  5. Read response until connection closed
  ```

  Response format:
  - Clean: "stream: OK"
  - Infected: "stream: <virus_name> FOUND"
  - Error: "stream: <message> ERROR"

  ## Configuration Options

  | Option | Type | Default | Description |
  |--------|------|---------|-------------|
  | scanEngine | String | CLAMAV | CLAMAV, REST_API, MOCK |
  | clamavHost | String | localhost | ClamAV daemon host |
  | clamavPort | int | 3310 | ClamAV daemon port |
  | connectionTimeout | int | 5000 | Connection timeout (ms) |
  | readTimeout | int | 60000 | Read timeout (ms) |
  | maxFileSize | long | 104857600 | Max file size (100MB) |
  | enabled | boolean | true | Enable/disable scanning |

