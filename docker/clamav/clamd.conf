# ClamAV Daemon Configuration
# For AEM Workflow Demo Course

# Socket settings
TCPSocket 3310
TCPAddr 0.0.0.0

# Logging
LogFile /var/log/clamav/clamd.log
LogTime yes
LogVerbose yes

# Scanning options
MaxScanSize 100M
MaxFileSize 100M
MaxRecursion 16
MaxFiles 10000

# Stream settings (for INSTREAM command)
StreamMaxLength 100M

# Performance tuning
MaxThreads 12
ReadTimeout 300
CommandReadTimeout 30
SendBufTimeout 200
MaxQueue 100
IdleTimeout 30

# Self-check interval (seconds)
SelfCheck 600

# Database settings
DatabaseDirectory /var/lib/clamav
OfficialDatabaseOnly no

# Preloading
Foreground yes
